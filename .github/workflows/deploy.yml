name: CI

# On every PR and push to main: run CI (gofmt/build/vet, `next build` which runs ESLint,
# `npm audit`). On push to main only, after CI passes: build the web + api images and push
# them to GHCR. Deploy is MANUAL and pull-based (see README "CI / Deploy"): you SSH to the box
# and run `git pull --ff-only && bash deploy/deploy.sh` (aliased to `deploy`), which pulls those
# images. Nothing reaches into the box from GitHub, so no inbound deploy path and port 22 stays
# firewalled to the operator's IP.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: false # zero third-party deps by design, no go.sum to cache

      - name: Go — gofmt, build, vet
        working-directory: api
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
          go build ./...
          go vet ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web — install, build (build runs ESLint), audit
        working-directory: web
        env:
          # NEXT_PUBLIC_* are inlined at build time; the CI check only needs the build to
          # succeed. The real image build (below) bakes the production values.
          NEXT_PUBLIC_SITE_URL: https://kobeyoung.net
          NEXT_PUBLIC_API_URL: https://kobeyoung.net/api
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-placeholder
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm ci
          npm run build
          npm audit --audit-level=high

  build-push:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    strategy:
      matrix:
        include:
          - image: web
            context: .
            dockerfile: web/Dockerfile
            # NEXT_PUBLIC_* are public (inlined into the client bundle) — safe to bake here.
            build_args: |
              NEXT_PUBLIC_SITE_URL=https://kobeyoung.net
              NEXT_PUBLIC_API_URL=https://kobeyoung.net/api
              NEXT_PUBLIC_TURNSTILE_SITE_KEY=0x4AAAAAADtrDymJT-GzGxwq
          - image: api
            context: api
            dockerfile: api/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kobeyoung-net-${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
